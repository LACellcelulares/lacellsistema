<link rel="stylesheet" href="/static/style.css">
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

h2{
    color:#22c55e;
}

.box{
    background:#111827;
    padding:20px;
    border-radius:12px;
    width:400px;
}

input, select{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:none;
    background:#1f2937;
    color:white;
}

button{
    width:100%;
    padding:12px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body>

<h2>✏️ Editar OS {{ os.numero }}</h2>

<div class="box">

<form method="post">

<input name="cliente" value="{{ os.get('cliente','') }}" placeholder="Cliente">

<input name="telefone" value="{{ os.get('telefone','') }}" placeholder="Telefone">

<input name="cpf" value="{{ os.get('cpf','') }}" placeholder="CPF/CNPJ">

<input name="imei" value="{{ os.get('imei','') }}" placeholder="IMEI">

<input name="aparelho" value="{{ os.get('aparelho','') }}" placeholder="Aparelho">

<input name="defeito" value="{{ os.get('defeito','') }}" placeholder="Defeito">

<input name="valor" value="{{ os.get('valor',0) }}" placeholder="Valor">

<input name="sinal" value="{{ os.get('sinal',0) }}" placeholder="Sinal">

<input name="custo" value="{{ os.get('custo',0) }}" placeholder="Custo">

<input name="frete" value="{{ os.get('frete',0) }}" placeholder="Frete">

<input name="pagamento" value="{{ os.get('pagamento','') }}" placeholder="Pagamento">

<input type="date" name="entrega" value="{{ os.get('entrega','') }}">

<select name="garantia">
    <option {% if os.get('garantia')=="Sem garantia" %}selected{% endif %}>Sem garantia</option>
    <option {% if os.get('garantia')=="30 dias" %}selected{% endif %}>30 dias</option>
    <option {% if os.get('garantia')=="60 dias" %}selected{% endif %}>60 dias</option>
    <option {% if os.get('garantia')=="90 dias" %}selected{% endif %}>90 dias</option>
</select>

<input name="senha" value="{{ os.get('senha','') }}" placeholder="Senha aparelho">

<button type="submit">💾 Salvar Alterações</button>

</form>
</div>

</body>
</html>
