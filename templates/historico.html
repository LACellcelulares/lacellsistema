<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#0f172a;color:white;font-family:Arial;padding:10px;}
h2{text-align:center;color:#22c55e;font-size:20px;}

input{
    padding:10px;
    border-radius:6px;
    border:none;
    margin-bottom:10px;
    width:100%;
}

.table-box{overflow-x:auto;}

table{
    width:100%;
    min-width:600px;
}

td,th{
    padding:8px;
    font-size:12px;
    border-bottom:1px solid #1f2937;
}

button{
    background:#22c55e;
    border:none;
    padding:6px;
    border-radius:6px;
}
</style>
</head>

<body>

<h2>📂 Histórico</h2>

<form method="get">
<input name="busca" placeholder="Buscar cliente, aparelho, telefone ou OS">
</form>

<div class="table-box">
<table>
<tr>
<th>OS</th><th>Cliente</th><th>Aparelho</th>
<th>Telefone</th><th>Data</th><th>Valor</th><th>Ação</th>
</tr>

{% for os in lista %}
<tr>
<td>{{ os.numero }}</td>
<td>{{ os.cliente or '-' }}</td>
<td>{{ os.aparelho or '-' }}</td>
<td>{{ os.telefone or '-' }}</td>
<td>{{ os.data }}</td>
<td>R$ {{ os.valor }}</td>

<td>
<a href="/os/{{ os.numero }}" target="_blank">
<button>Ver</button>
</a>
</td>
</tr>
{% endfor %}

</table>
</div>

</body>
</html>
