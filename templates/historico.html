<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<style>
body{background:#0f172a;color:white;font-family:Arial;padding:15px;}
h2{text-align:center;color:#22c55e;}

table{width:100%;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #1f2937;}

button{
    background:#22c55e;
    border:none;
    padding:6px;
    border-radius:6px;
}
</style>
</head>

<body>

<h2>📂 Histórico</h2>

<table>
<tr>
<th>OS</th>
<th>Cliente</th>
<th>Data</th>
<th>Ação</th>
</tr>

{% for os in lista %}
<tr>
<td>{{ os.numero }}</td>
<td>{{ os.cliente }}</td>
<td>{{ os.data }}</td>
<td>
<a href="/os/{{ os.numero }}" target="_blank"><button>Ver</button></a>
<a href="/editar/{{ os.numero }}"><button>Editar</button></a>
</td>
</tr>
{% endfor %}
</table>

</body>
</html>
