<link rel="stylesheet" href="/static/style.css">

<h2>Histórico</h2>

<table>
<tr>
<th>OS</th><th>Cliente</th><th>Valor</th><th>Ação</th>
</tr>

{% for o in lista %}

<td>{{ o.cliente }}</td>

{% endfor %}
