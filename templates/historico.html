<h2>📂 Histórico de OS</h2>

<form method="get">
<input name="q" placeholder="Buscar cliente, aparelho ou nº OS" value="{{ busca }}">
<button>🔎 Buscar</button>
</form>

<br>

{% for o in lista %}
<hr>
OS: <b>{{ o.numero }}</b><br>
Cliente: {{ o.cliente }}<br>
Aparelho: {{ o.aparelho }}<br>
Valor: R$ {{ o.valor }}<br>

<a href="/os/{{ o.numero }}" target="_blank">👁️ Ver</a>
<a href="/os/{{ o.numero }}?download=1">🖨️ Imprimir</a>

<a target="_blank"
href="https://wa.me/55{{ o.telefone|replace('(','')|replace(')','')|replace('-','')|replace(' ','') }}">
🟢 WhatsApp
</a>
{% endfor %}

<br><br>
<a href="/painel">⬅ Voltar</a>
