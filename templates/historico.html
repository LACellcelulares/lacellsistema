<h2>📂 Histórico de OS</h2>

<form method="get">
    <input name="busca" placeholder="Buscar por cliente, aparelho ou nº OS">
    <button type="submit">Buscar</button>
</form>

<hr>

{% for os in lista %}
<div style="border:1px solid #ccc; padding:10px; margin:10px;">
    <b>OS:</b> {{ os.numero }}<br>
    <b>Cliente:</b> {{ os.cliente }}<br>
    <b>Aparelho:</b> {{ os.aparelho }}<br>
    <b>Valor:</b> R$ {{ os.valor }}<br><br>

    <a href="/reimprimir/{{ os.numero }}">🖨 Reimprimir</a>
</div>
{% else %}
<p>Nenhuma OS encontrada.</p>
{% endfor %}

<br>
<a href="/painel">⬅ Voltar</a>
