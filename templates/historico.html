<h2>📂 Histórico</h2>

<table>
<tr>
<th>OS</th>
<th>Cliente</th>
<th>Aparelho</th>
<th>Telefone</th>
<th>Data</th>
<th>Valor</th>
<th>Ação</th>
</tr>

{% for os in lista %}
<tr>
<td>{{ os.numero }}</td>
<td>{{ os.cliente }}</td>
<td>{{ os.aparelho }}</td>
<td>{{ os.telefone }}</td>
<td>{{ os.data }}</td>
<td>R$ {{ os.valor }}</td>
<td>
<a href="/os/{{ os.numero }}" target="_blank"><button>Ver</button></a>
<a href="/editar/{{ os.numero }}"><button>Editar</button></a>
</td>
</tr>
{% endfor %}
</table>
