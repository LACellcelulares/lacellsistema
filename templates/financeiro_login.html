<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:40px;
}

input{
    padding:10px;
    border-radius:8px;
    border:none;
    margin:10px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#22c55e;
}
</style>
</head>

<body>

<h2>🔒 Acesso Financeiro</h2>

<form method="post">
<input type="password" name="senha" placeholder="Digite a senha">
<br>
<button>Entrar</button>
</form>

{% if erro %}
<p style="color:red">{{ erro }}</p>
{% endif %}

</body>
</html>
