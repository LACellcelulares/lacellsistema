<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    color:white;
    padding:20px;
}

h2{
    text-align:center;
    color:#22c55e;
    margin-bottom:20px;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:12px;
    max-width:500px;
    margin:auto;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

.info{
    font-size:18px;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:14px;
    margin:6px 0;
    border:none;
    border-radius:8px;
    font-weight:bold;
    background:#22c55e;
    color:#0f172a;
    cursor:pointer;
}

.sair{
    background:#dc2626;
    color:white;
}
</style>
</head>

<body>

<h2>📊 Painel</h2>

<div class="card">

<div class="info">
    OS: <b>{{ total_os }}</b>
</div>

<a href="/nova"><button>➕ Nova OS</button></a>
<a href="/historico"><button>📂 Histórico</button></a>
<a href="/financeiro"><button>💰 Financeiro</button></a>
<a href="/sair"><button class="sair">🚪 Sair</button></a>

</div>

</body>
</html>
