<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    />

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #22c55e;
            font-weight: bold;
        }

        .card-box {
            background: #111827;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        .btn-menu {
            width: 100%;
            margin-bottom: 10px;
            background: #22c55e;
            color: #0f172a;
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
        }

        .btn-menu:hover {
            opacity: .9;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h2>📊 Painel</h2>

    <div class="card-box">
        <p style="font-size: 18px;">
            OS no sistema: <b>{{ total_os }}</b><br>
            Faturamento total: <b>R$ {{ "%.2f"|format(total_valor) }}</b>
        </p>
    </div>

    <a href="/nova"><button class="btn btn-menu">➕ Nova OS</button></a>
    <a href="/historico"><button class="btn btn-menu">📂 Histórico</button></a>
    <a href="/relatorio"><button class="btn btn-menu">📄 Relatório Mensal</button></a>
    <a href="/sair"><button class="btn btn-menu" style="background:#dc2626; color:white;">🚪 Sair</button></a>

</body>
</html>
