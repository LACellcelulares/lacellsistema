<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>L&A CELL — Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap para responsividade -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    />

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0f172a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: #111827;
            padding: 35px;
            border-radius: 14px;
            width: 92%;
            max-width: 360px;
            box-shadow: 0 0 25px rgba(0,0,0,0.45);
        }

        h1 {
            color: #22c55e;
            margin-bottom: 28px;
            font-size: 26px;
            text-align: center;
        }

        .form-control {
            background: #1f2937;
            border: none;
            color: white;
            padding: 14px;
        }

        .form-control:focus {
            box-shadow: none;
            outline: 2px solid #22c55e;
        }

        .btn-login {
            background: #22c55e;
            color: #0f172a;
            padding: 14px;
            font-weight: bold;
            border-radius: 8px;
            width: 100%;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .erro {
            color: #ef4444;
            margin-top: 12px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>L&A CELL</h1>

        <form method="POST">

            <div class="mb-3">
                <input type="text" name="usuario" class="form-control" placeholder="Usuário" required>
            </div>

            <div class="mb-3">
                <input type="password" name="senha" class="form-control" placeholder="Senha" required>
            </div>

            <button type="submit" class="btn btn-login">Entrar</button>
        </form>

        {% if erro %}
            <div class="erro">{{ erro }}</div>
        {% endif %}
    </div>

</body>
</html>
