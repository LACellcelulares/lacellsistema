<link rel="stylesheet" href="/static/style.css">

<h2>Financeiro</h2>

<table>
<tr>
<th>OS</th><th>Cliente</th><th>Valor</th><th>Status</th><th>Ação</th>
</tr>

{% for o in lista %}
<tr>
<td>{{ o.numero }}</td>
<td>{{ o.cliente }}</td>
<td>R$ {{ o.valor }}</td>
<td>{% if o.restante == 0 %}PAGO{% else %}ABERTO{% endif %}</td>
<td>
<a href="/editar/{{ o.numero }}">Editar</a>
<a href="/pagar/{{ o.numero }}">Pagar</a>
<a href="/cancelar/{{ o.numero }}">Excluir</a>
</td>
</tr>
{% endfor %}
</table>

<h3>Lucro: R$ {{ lucro }}</h3>
