<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<style>
body{background:#0f172a;color:white;font-family:Arial;padding:15px;}
h2{text-align:center;color:#22c55e;}

.card{
    background:#111827;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
}

button{
    background:#22c55e;
    border:none;
    padding:6px;
    border-radius:6px;
}
</style>
</head>

<body>

<h2>💰 Financeiro</h2>

{% for os in lista %}
<div class="card">
<b>OS {{ os.id }}</b><br>
{{ os.cliente }}<br>

Valor: {{ os.valor }}<br>
Custo: {{ os.custo }}<br>
Frete: {{ os.frete }}<br>

<b>Lucro: {{ os.valor - os.custo - os.frete }}</b><br>

<a href="/editar/{{ os.id }}"><button>Editar</button></a>
</div>
{% endfor %}

</body>
</html>
