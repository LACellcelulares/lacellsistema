<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<style>
body{background:#0f172a;color:white;font-family:Arial;padding:15px;}
h2{text-align:center;color:#22c55e;}

.card{
    background:#111827;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
}

button{
    background:#22c55e;
    border:none;
    padding:6px;
    border-radius:6px;
}
</style>
</head>

<body>

<h2>💰 Financeiro</h2>

{% for os in lista %}
<div class="card">
<b>OS {{ os.numero }}</b><br>
{{ os.cliente }}<br><br>

Valor: R$ {{ os.valor }}<br>
Custo: R$ {{ os.custo or 0 }}<br>
Frete: R$ {{ os.frete or 0 }}<br>

<b>Lucro: R$ {{ (os.valor or 0) - (os.custo or 0) - (os.frete or 0) }}</b><br><br>

<a href="/editar/{{ os.numero }}"><button>Editar</button></a>
</div>
{% endfor %}

</body>
</html>
