{% for o in lista %}
<div class="os-card">

<b>OS #{{ o.numero }}</b><br>
Cliente: {{ o.cliente }}<br>
Aparelho: {{ o.aparelho }}<br>

Valor: R$ {{ o.valor }}<br>
Custo+Frete: R$ {{ o.custo_total }}<br>
Lucro: R$ {{ o.lucro }}<br>
Em aberto: R$ {{ o.restante }}<br>

<a href="/os/{{ o.numero }}" target="_blank">👁️ Ver OS</a>

</div>
{% endfor %}
