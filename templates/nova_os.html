<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nova OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body{
        margin:0;
        background:#0f172a;
        font-family:Arial, Helvetica, sans-serif;
        color:white;
        padding:15px;
    }

    h2{
        color:#22c55e;
        text-align:center;
        margin-bottom:20px;
    }

    .box{
        background:#111827;
        padding:20px;
        border-radius:12px;
        max-width:460px;
        margin:auto;
        box-shadow:0 0 20px rgba(0,0,0,.35);
    }

    label{
        font-size:15px;
        font-weight:bold;
    }

    input, select{
        width:100%;
        padding:12px;
        margin:8px 0 18px 0;
        border-radius:8px;
        border:none;
        background:#1f2937;
        color:white;
        font-size:15px;
    }

    button{
        width:100%;
        padding:14px;
        border:none;
        border-radius:8px;
        background:#22c55e;
        color:#0f172a;
        font-weight:bold;
        font-size:16px;
        cursor:pointer;
    }

    a{
        display:block;
        text-align:center;
        margin-top:20px;
        color:#22c55e;
        text-decoration:none;
    }
</style>
</head>

<body>

<h2>🧾 Nova Ordem de Serviço</h2>

<div class="box">

<form method="post">

<label>Cliente:</label>
<input name="cliente" required>

<label>Telefone:</label>
<input name="telefone" id="tel" required>

<label>Aparelho:</label>
<input name="aparelho" required>

<label>IMEI:</label>
<input name="imei">

<label>CPF:</label>
<input name="cpf">

<label>Defeito:</label>
<input name="defeito">

<label>Valor:</label>
<input name="valor" id="valor">

<label>Sinal:</label>
<input name="sinal" id="sinal">

<label>Restante:</label>
<input name="restante" id="restante" readonly>

<!-- 🔥 NOVO FINANCEIRO -->
<label>Custo da peça:</label>
<input name="custo">

<label>Frete:</label>
<input name="frete">

<label>Pagamento:</label>
<input name="pagamento">

<label>Entrega:</label>
<input type="date" name="entrega">

<label>Garantia:</label>
<select name="garantia">
    <option>Sem garantia</option>
    <option>30 dias</option>
    <option>60 dias</option>
    <option>90 dias</option>
</select>

<label>Senha do aparelho:</label>
<input name="senha">

<button type="submit">💾 Gerar OS</button>

</form>
</div>

<a href="/painel">⬅ Voltar</a>

<script>
// telefone
document.getElementById('tel').addEventListener('input', e=>{
 let v=e.target.value.replace(/\D/g,'').slice(0,11)
 if(v.length>6) v=v.replace(/(\d{2})(\d{5})(\d{0,4})/,'($1)$2-$3')
 else if(v.length>2) v=v.replace(/(\d{2})(\d{0,5})/,'($1)$2')
 e.target.value=v
})

// cálculo restante
function calc(){
 let v=parseFloat(valor.value)||0
 let s=parseFloat(sinal.value)||0
 restante.value=(v-s).toFixed(2)
}
valor.oninput=calc
sinal.oninput=calc
</script>

</body>
</html>
