<form method="post">

<input name="cliente" placeholder="Cliente" required>
<input name="telefone" id="tel" placeholder="Telefone" required>
<input name="aparelho" placeholder="Aparelho" required>

<input name="defeito" placeholder="Defeito">

<input name="valor" id="valor" placeholder="Valor">
<input name="sinal" id="sinal" placeholder="Sinal">
<input name="custo" placeholder="Custo">
<input name="frete" placeholder="Frete">

<input name="restante" id="restante" placeholder="Restante" readonly>

<select name="garantia">
<option>Sem garantia</option>
<option>30 dias</option>
<option>60 dias</option>
<option>90 dias</option>
</select>

<input name="senha" placeholder="Senha">

<button type="submit">Gerar OS</button>

</form>

<script>
function calc(){
 let v=parseFloat(valor.value)||0
 let s=parseFloat(sinal.value)||0
 restante.value=(v-s).toFixed(2)
}
valor.oninput=calc
sinal.oninput=calc
</script>
