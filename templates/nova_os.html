<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nova OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    color:white;
    padding:15px;
}
h2{
    color:#22c55e;
    text-align:center;
}
.box{
    background:#111827;
    padding:20px;
    border-radius:12px;
    max-width:500px;
    margin:auto;
}
input, select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    border:none;
    background:#1f2937;
    color:white;
}
button{
    width:100%;
    padding:14px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    font-weight:bold;
}
a{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#22c55e;
}
</style>
</head>

<body>

<h2>🧾 Nova OS</h2>

<div class="box">

<form method="post">

<input name="cliente" placeholder="Cliente" required>
<input name="telefone" id="tel" placeholder="Telefone" required>
<input name="aparelho" placeholder="Aparelho" required>

<input name="imei" placeholder="IMEI">
<input name="cpf" placeholder="CPF">

<input name="defeito" placeholder="Defeito">

<!-- FINANCEIRO -->
<input name="valor" id="valor" placeholder="Valor">
<input name="sinal" id="sinal" placeholder="Sinal">
<input name="custo" id="custo" placeholder="Custo">
<input name="frete" id="frete" placeholder="Frete">

<input name="restante" id="restante" placeholder="Restante" readonly>

<input name="pagamento" placeholder="Forma de pagamento">

<input type="date" name="entrega">

<select name="garantia">
    <option>Sem garantia</option>
    <option>30 dias</option>
    <option>60 dias</option>
</select>

<input name="senha" placeholder="Senha do aparelho">

<button type="submit">💾 Gerar OS</button>

</form>
</div>

<a href="/painel">⬅ Voltar</a>

<script>
// TELEFONE
tel.oninput = e=>{
 let v=e.target.value.replace(/\D/g,'').slice(0,11)
 if(v.length>6) v=v.replace(/(\d{2})(\d{5})(\d+)/,'($1)$2-$3')
 else if(v.length>2) v=v.replace(/(\d{2})(\d+)/,'($1)$2')
 e.target.value=v
}

// CALCULO
function calc(){
 let v=parseFloat(valor.value)||0
 let s=parseFloat(sinal.value)||0
 restante.value=(v-s).toFixed(2)
}

valor.oninput=calc
sinal.oninput=calc

// MOEDA SIMPLES
function moeda(campo){
 campo.oninput = ()=>{
  let v = campo.value.replace(/\D/g,'')
  v = (v/100).toFixed(2)
  campo.value = v
 }
}

moeda(valor)
moeda(sinal)
moeda(custo)
moeda(frete)

</script>

</body>
</html>
