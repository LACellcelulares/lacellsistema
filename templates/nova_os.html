<h2>🧾 Nova Ordem de Serviço</h2>

<form method="post">
Cliente:<br><input name="cliente" required><br><br>
Telefone:<br><input name="telefone" id="tel" required><br><br>
Aparelho:<br><input name="aparelho" required><br><br>
IMEI:<br><input name="imei"><br><br>
CPF:<br><input name="cpf"><br><br>
Defeito:<br><input name="defeito"><br><br>
Valor:<br><input name="valor" id="valor"><br><br>
Sinal:<br><input name="sinal" id="sinal"><br><br>
Restante:<br><input name="restante" id="restante" readonly><br><br>
Pagamento:<br><input name="pagamento"><br><br>
Entrega:<br><input type="date" name="entrega"><br><br>
Garantia:<br>
<select name="garantia">
<option>Sem garantia</option>
<option>30 dias</option>
<option>60 dias</option>
<option>90 dias</option>
</select><br><br>
Senha:<br><input name="senha"><br><br>

<button type="submit">💾 Gerar OS</button>
</form>

<script>
document.getElementById('tel').addEventListener('input', e=>{
 let v=e.target.value.replace(/\D/g,'').slice(0,11)
 if(v.length>6) v=v.replace(/(\d{2})(\d{5})(\d{0,4})/,'($1)$2-$3')
 else if(v.length>2) v=v.replace(/(\d{2})(\d{0,5})/,'($1)$2')
 e.target.value=v
})

function calc(){
 let v=parseFloat(valor.value)||0
 let s=parseFloat(sinal.value)||0
 restante.value=(v-s).toFixed(2)
}
valor.oninput=calc
sinal.oninput=calc
</script>
